<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TLAC SVG variant proof</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
        color: #2b2118;
        background: #f3ebdd;
      }
      body { margin: 0; padding: 40px; }
      h1 { font: 900 40px Fraunces, Georgia, serif; margin: 0 0 28px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 20px;
      }
      figure {
        margin: 0;
        padding: 18px;
        border-radius: 16px;
        background: #fffdf8;
        border: 1px solid #ded1bd;
      }
      figure.dark { background: #201a15; color: #f3ebdd; }
      img { display: block; width: 100%; aspect-ratio: 1; }
      figcaption { margin-top: 12px; font-weight: 700; text-align: center; }
      @media (max-width: 800px) {
        body { padding: 20px; }
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <h1>SVG variant render proof</h1>
    <div class="grid">
      <figure>
        <img src="../source/tlac-owl-mark.svg" alt="" />
        <figcaption>Full color</figcaption>
      </figure>
      <figure>
        <img src="../source/tlac-owl-mark-one-color.svg" alt="" />
        <figcaption>One color</figcaption>
      </figure>
      <figure class="dark">
        <img src="../source/tlac-owl-mark-reversed.svg" alt="" />
        <figcaption>Reversed</figcaption>
      </figure>
      <figure>
        <img src="../source/tlac-owl-mark-grayscale.svg" alt="" />
        <figcaption>Grayscale</figcaption>
      </figure>
      <figure>
        <img src="../source/tlac-owl-mark-silhouette.svg" alt="" />
        <figcaption>Silhouette</figcaption>
      </figure>
    </div>
  </body>
</html>
